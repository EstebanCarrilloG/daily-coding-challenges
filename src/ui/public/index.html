<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Coding Challenges Calendar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Roboto+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="layout">

      <section class="controls card">
        <div class="field">
          <label for="yearSelect">Year</label>
          <select id="yearSelect"></select>
        </div>

        <div class="field">
          <label for="monthSelect">Month</label>
          <select id="monthSelect"></select>
        </div>

        <button id="refreshButton" class="refresh-button" type="button">
          Refresh solutions
        </button>
      </section>

      <section class="content-grid">
        <article class="calendar card">
          <header class="calendar-header">
            <h2 id="calendarTitle">Challenge Calendar</h2>
            <p id="calendarSubtitle"></p>
          </header>

          <div class="weekday-grid" aria-hidden="true">
            <span>Sun</span>
            <span>Mon</span>
            <span>Tue</span>
            <span>Wed</span>
            <span>Thu</span>
            <span>Fri</span>
            <span>Sat</span>
          </div>

          <div id="calendarGrid" class="calendar-grid"></div>
        </article>

        <aside class="solution card">
          <header class="solution-header">
            <h2 id="solutionTitle">Select a day with a solution</h2>
            <p id="solutionMeta">
              The panel will display the file path and source code.
            </p>
          </header>

          <pre class="solution-code"><code id="solutionCode"></code></pre>
        </aside>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
